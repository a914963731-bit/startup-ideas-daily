name: Daily Startup Ideas Push

on:
  schedule:
    - cron: '0 4 * * *'  # GitHub 内部调度（可能不稳定）
  workflow_dispatch:
  repository_dispatch:
    types: [daily-push]  # 外部服务触发（更可靠）

jobs:
  push-ideas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python ecommerce_daily_push.py

      - name: Upload pushed log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pushed-log
          path: pushed_log.json
          retention-days: 30